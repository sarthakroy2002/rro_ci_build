name: Build CertifiedPropsOverlay

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6 * * *'

env:
  GH_USERNAME: sarthakroy2002

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_push: ${{ steps.compare.outputs.should_push }}
      latest_ver: ${{ steps.latest.outputs.latest_ver }}
      current_ver: ${{ steps.latest.outputs.current_ver }}

    steps:
      - name: Fetch latest and current version
        id: latest
        run: |
          set -euo pipefail

          latestver=$(curl -fsSL https://github.com/yaap/vendor_yaap/raw/sixteen/overlay/CertifiedPropsOverlay/AndroidManifest.xml | grep -oP 'versionName="\K[^"]+')
          currentver=$(curl -fsSL https://github.com/yaap/ota-info/raw/full-signed/cancunf/cert.json | jq -r '.version')

          echo "latest_ver=${latestver}" >> "$GITHUB_OUTPUT"
          echo "current_ver=${currentver}" >> "$GITHUB_OUTPUT"

      - name: Compare against current version
        id: compare
        env:
          LATEST_VER: ${{ steps.latest.outputs.latest_ver }}
          CURRENT_VER: ${{ steps.latest.outputs.current_ver }}
        run: |
          set -euo pipefail

          if [ "$CURRENT_VER" != "$LATEST_VER" ]; then
            echo "Detected upstream CertifiedPropsOverlay changes"
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "Current CertifiedPropsOverlay version already match upstream version"
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-version.outputs.should_push == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "build-tools;35.0.0"
          sdkmanager "platforms;android-36"

      - name: Clone YAAP vendor repo
        run: |
          git clone --depth=1 \
            https://github.com/yaap/vendor_yaap.git

      - name: Setup certs
        env:
          GMS_CERT_PRIV: ${{ secrets.GMS_CERT_PRIV }}
          GMS_CERT_PUB: ${{ secrets.GMS_CERT_PUB }}
          VANILLA_CERT_PRIV: ${{ secrets.VANILLA_CERT_PRIV }}
          VANILLA_CERT_PUB: ${{ secrets.VANILLA_CERT_PUB }}
        run: |
          printf '%s' "$GMS_CERT_PRIV" | base64 -d > releasekey_gms.pk8
          printf '%s\n' "$GMS_CERT_PUB" > releasekey_gms.x509.pem
          printf '%s' "$VANILLA_CERT_PRIV" | base64 -d > releasekey_vanilla.pk8
          printf '%s\n' "$VANILLA_CERT_PUB" > releasekey_vanilla.x509.pem

      - name: Build overlay APK
        run: |
          cd vendor_yaap/overlay/CertifiedPropsOverlay

          mkdir -p compiled out

          $ANDROID_HOME/build-tools/35.0.0/aapt2 compile \
            --dir res \
            -o compiled

          $ANDROID_HOME/build-tools/35.0.0/aapt2 link \
            -o out/CertifiedPropsOverlay-unsigned.apk \
            --min-sdk-version 24 \
            --target-sdk-version 36 \
            --manifest AndroidManifest.xml \
            -I $ANDROID_HOME/platforms/android-36/android.jar \
            --auto-add-overlay \
            compiled/*.flat

      - name: Zipalign APK
        run: |
          $ANDROID_HOME/build-tools/35.0.0/zipalign -f 4 \
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-unsigned.apk \
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-aligned.apk

      - name: Sign APKs
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --key releasekey_gms.pk8 \
            --cert releasekey_gms.x509.pem \
            --out vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-gms.apk \
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-aligned.apk

          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --key releasekey_vanilla.pk8 \
            --cert releasekey_vanilla.x509.pem \
            --out vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-vanilla.apk \
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-aligned.apk

      - name: Verify APK
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify -v \
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-gms.apk

          $ANDROID_HOME/build-tools/35.0.0/apksigner verify -v \
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-vanilla.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CertifiedPropsOverlay
          path: |
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-gms.apk
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-vanilla.apk

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CertifiedPropsOverlay ${{ steps.tag.outputs.tag }}
          files: |
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-gms.apk
            vendor_yaap/overlay/CertifiedPropsOverlay/out/CertifiedPropsOverlay-vanilla.apk
        env:
          GITHUB_TOKEN: ${{ secrets.CERTS_TOKEN }}

  push:
    needs: [check-version, build]
    if: ${{ needs.check-version.outputs.should_push == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: CertifiedPropsOverlay
          path: artifacts

      - name: Push APKs to ota-info repo
        env:
          LATEST_VER: ${{ needs.check-version.outputs.latest_ver }}
        run: |
          set -euo pipefail

          git config --global user.name "Sarthak Roy"
          git config --global user.email "sarthakroy2002@gmail.com"

          git clone "https://${GH_USERNAME}:${{ secrets.CERTS_TOKEN }}@github.com/yaap/ota-info.git"

          cp artifacts/CertifiedPropsOverlay-gms.apk ota-info/cancunf/cert.apk
          cp artifacts/CertifiedPropsOverlay-vanilla.apk ota-info/sunny/cert.apk

          sed -i -E "s/(\"version\": )[0-9.]+/\1$LATEST_VER/" ota-info/cancunf/cert.json
          sed -i -E "s/(\"version\": )[0-9.]+/\1$LATEST_VER/" ota-info/sunny/cert.json

          cd ota-info

          git add cancunf
          git commit -m "cancunf: Update certified fingerprint"
          git push origin HEAD

          git add sunny
          git commit -m "sunny: Update certified fingerprint"
          git push origin HEAD

          git checkout vanilla-signed

          cp ../artifacts/CertifiedPropsOverlay-vanilla.apk cancunf/cert.apk
          cp ../artifacts/CertifiedPropsOverlay-vanilla.apk sunny/cert.apk

          sed -i -E "s/(\"version\": )[0-9.]+/\1$LATEST_VER/" cancunf/cert.json
          sed -i -E "s/(\"version\": )[0-9.]+/\1$LATEST_VER/" sunny/cert.json

          git add cancunf
          git commit -m "cancunf: Update certified fingerprint"
          git push origin HEAD

          git add sunny
          git commit -m "sunny: Update certified fingerprint"
          git push origin HEAD
